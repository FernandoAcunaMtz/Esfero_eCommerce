<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/esfero/frontend

    <Directory /var/www/esfero/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # CGI Python backend
    ScriptAlias /esfero/backend/cgi-bin/ /var/www/esfero/backend/cgi-bin/

    <Directory /var/www/esfero/backend/cgi-bin>
        Options +ExecCGI
        AddHandler cgi-script .py
        Require all granted
        AllowOverride None
        SetHandler cgi-script
    </Directory>

    # Pass Authorization header to CGI
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    ErrorLog ${APACHE_LOG_DIR}/esfero_error.log
    CustomLog ${APACHE_LOG_DIR}/esfero_access.log combined
</VirtualHost>
