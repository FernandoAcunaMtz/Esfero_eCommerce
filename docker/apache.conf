<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/esfero/frontend

    <Directory /var/www/esfero/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # CGI Python backend
    ScriptAlias /esfero/backend/cgi-bin/ /var/www/esfero/backend/cgi-bin/

    <Directory /var/www/esfero/backend/cgi-bin>
        Options +ExecCGI
        AddHandler cgi-script .py
        Require all granted
        AllowOverride None
        SetHandler cgi-script
    </Directory>

    # Pass Authorization header to CGI
    SetEnvIf Authorization "(.*)" HTTP_AUTHORIZATION=$1

    # Assets estáticos: caché larga (1 año) — versionar por nombre de archivo si cambian
    <FilesMatch "\.(css|js|png|jpg|jpeg|gif|svg|webp|woff2?|ico)$">
        Header set Cache-Control "public, max-age=31536000, immutable"
    </FilesMatch>

    # Service Worker: nunca cachear para que el browser detecte actualizaciones
    <Files "sw.js">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Service-Worker-Allowed "/"
    </Files>

    # Manifest: cache corto
    <Files "manifest.json">
        Header set Cache-Control "public, max-age=3600"
    </Files>

    ErrorLog ${APACHE_LOG_DIR}/esfero_error.log
    CustomLog ${APACHE_LOG_DIR}/esfero_access.log combined
</VirtualHost>
