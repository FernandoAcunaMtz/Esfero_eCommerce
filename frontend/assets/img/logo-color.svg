<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none" role="img" aria-label="Esfero">
  <defs>
    <!-- Gradiente radial con nueva paleta: #0FB882 (esmeralda) → #0D87A8 (teal) → #044E65 (deep) -->
    <radialGradient id="sphereG" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#0FB882"/>
      <stop offset="50%"  stop-color="#0D87A8"/>
      <stop offset="100%" stop-color="#044E65"/>
    </radialGradient>

    <clipPath id="clip">
      <circle cx="28" cy="28" r="24"/>
    </clipPath>

    <filter id="shadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#044E65" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Esfera -->
  <circle cx="28" cy="28" r="24" fill="url(#sphereG)" filter="url(#shadow)"/>

  <!-- Arcos de latitud -->
  <ellipse cx="28" cy="28" rx="24" ry="9"  fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.4" clip-path="url(#clip)"/>
  <ellipse cx="28" cy="19" rx="24" ry="5"  fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"   clip-path="url(#clip)"/>
  <ellipse cx="28" cy="37" rx="24" ry="5"  fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"   clip-path="url(#clip)"/>

  <!-- Meridiano -->
  <ellipse cx="28" cy="28" rx="9" ry="24" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" clip-path="url(#clip)"/>

  <!-- Brillo especular -->
  <ellipse cx="19" cy="18" rx="9" ry="6.5" fill="rgba(255,255,255,0.18)" clip-path="url(#clip)"/>
  <ellipse cx="17" cy="16" rx="4"  ry="3"  fill="rgba(255,255,255,0.28)" clip-path="url(#clip)"/>

  <!-- Borde sutil -->
  <circle cx="28" cy="28" r="24" stroke="rgba(4,78,101,0.18)" stroke-width="1"/>

  <!-- Wordmark -->
  <text
    x="62" y="35"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="white"
  >Esfero</text>
</svg>
