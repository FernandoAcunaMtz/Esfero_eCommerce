<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" fill="none" role="img" aria-label="Esfero">
  <defs>
    <radialGradient id="sphereGW" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="55%"  stop-color="rgba(255,255,255,0.75)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.50)"/>
    </radialGradient>
    <clipPath id="clipW">
      <circle cx="28" cy="28" r="24"/>
    </clipPath>
  </defs>

  <!-- Esfera blanca semi-translúcida -->
  <circle cx="28" cy="28" r="24" fill="url(#sphereGW)"/>

  <!-- Arcos de latitud -->
  <ellipse cx="28" cy="28" rx="24" ry="9"  fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.4" clip-path="url(#clipW)"/>
  <ellipse cx="28" cy="19" rx="24" ry="5"  fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"   clip-path="url(#clipW)"/>
  <ellipse cx="28" cy="37" rx="24" ry="5"  fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1"   clip-path="url(#clipW)"/>

  <!-- Meridiano -->
  <ellipse cx="28" cy="28" rx="9" ry="24" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1" clip-path="url(#clipW)"/>

  <!-- Brillo especular -->
  <ellipse cx="19" cy="18" rx="9" ry="6.5" fill="rgba(255,255,255,0.35)" clip-path="url(#clipW)"/>
  <ellipse cx="17" cy="16" rx="4"  ry="3"  fill="rgba(255,255,255,0.55)" clip-path="url(#clipW)"/>

  <!-- Borde -->
  <circle cx="28" cy="28" r="24" stroke="rgba(255,255,255,0.5)" stroke-width="1"/>

  <!-- Wordmark blanco -->
  <text
    x="62" y="35"
    font-family="Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif"
    font-size="26"
    font-weight="700"
    letter-spacing="-0.5"
    fill="white"
  >Esfero</text>
</svg>
